name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: week2-mission1
      id: week2-mission1
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: week2-mission1
        setup-command: gcc -o main main.c
        command: "./main"
        input: ''
        expected-output: 안녕하세요\s*[\r\n]{2,}\s*제이름은\s+.*\s+입니다\.\s*[\r\n]+\s*그럼\s+이만
        comparison-method: regex
        timeout: 1
        max-score: 100
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        WEEK2-MISSION1_RESULTS: "${{steps.week2-mission1.outputs.result}}"
      with:
        runners: week2-mission1
